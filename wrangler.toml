name = "second-brain"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# AUTH_TOKEN is prompted during Deploy to Cloudflare flow
# Schema auto-creates on first Worker request

[[d1_databases]]
binding = "DB"
database_name = "second-brain-db"
database_id = ""

[[vectorize]]
binding = "VECTORIZE"
index_name = "second-brain-vectors"
dimensions = 384
metric = "cosine"
# Created automatically by Deploy to Cloudflare button
# Or manually: wrangler vectorize create second-brain-vectors --dimensions=384 --metric=cosine

[ai]
binding = "AI"

# Stores OAuth tokens and dynamic client registrations for the /mcp endpoint.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = ""
# Create manually: wrangler kv namespace create OAUTH_KV
# then paste the returned id above.

[vars]
VECTORIZE_GRACE_MS = "300000"

[assets]
directory = "./public"

[triggers]
crons = ["0 1 * * *"]